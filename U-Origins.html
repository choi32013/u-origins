<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>U-Origins — 열린 역사 아카이브</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; }
  html, body, #root { margin: 0; padding: 0; height: 100%; width: 100%; }
  body {
    font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: #f0eee9;
    color: #1a1815;
    -webkit-font-smoothing: antialiased;
  }
  input[type="range"] {
    -webkit-appearance: none; appearance: none;
    background: transparent; height: 20px;
  }
  input[type="range"]::-webkit-slider-runnable-track {
    height: 4px; background: #eae5d8; border-radius: 2px;
  }
  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none; appearance: none;
    width: 16px; height: 16px; border-radius: 50%;
    background: #c25b3f; border: 2px solid #fff;
    box-shadow: 0 1px 4px rgba(0,0,0,0.2);
    margin-top: -6px; cursor: pointer;
  }
  /* Tweaks 패널 */
  .tweaks-panel {
    position: fixed; bottom: 20px; right: 20px;
    background: #fff; border-radius: 10px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.12);
    padding: 16px 18px; width: 240px;
    z-index: 50;
    font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
    display: none;
  }
  .tweaks-panel.active { display: block; }
  .tweaks-panel h3 { margin: 0 0 12px; font-size: 13px; letterSpacing: 0.5px; color: #6b6a63; text-transform: uppercase; }
  .tweaks-panel label { font-size: 12px; color: #3a352d; display: block; margin-bottom: 4px; }
  .tweaks-panel input[type="range"] { width: 100%; }
  .tweaks-value { font-size: 11px; color: #8a8578; margin-top: 2px; }
</style>
</head>
<body>
<div id="root"></div>

<!-- Tweaks 패널 -->
<div class="tweaks-panel" id="tweaks-panel">
  <h3>Tweaks</h3>
  <label>자동재생 속도</label>
  <input type="range" id="tweak-speed" min="1" max="30" step="1" value="8">
  <div class="tweaks-value" id="tweak-speed-val">8× (초당 프레임)</div>
</div>

<script>
  // Tweaks 기본값
  const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
    "playSpeed": 8
  }/*EDITMODE-END*/;
  window.__TWEAKS = { ...TWEAK_DEFAULTS };

  // Tweaks 프로토콜
  const panel = document.getElementById('tweaks-panel');
  const speedInput = document.getElementById('tweak-speed');
  const speedVal = document.getElementById('tweak-speed-val');
  speedInput.value = TWEAK_DEFAULTS.playSpeed;
  speedVal.textContent = TWEAK_DEFAULTS.playSpeed + '× (초당 프레임)';

  window.addEventListener('message', (e) => {
    if (e.data?.type === '__activate_edit_mode') panel.classList.add('active');
    if (e.data?.type === '__deactivate_edit_mode') panel.classList.remove('active');
  });

  speedInput.addEventListener('input', (e) => {
    const v = Number(e.target.value);
    speedVal.textContent = v + '× (초당 프레임)';
    window.__TWEAKS.playSpeed = v;
    window.postMessage({ type: '__tweak_update', key: 'playSpeed', value: v }, '*');
    window.parent.postMessage({
      type: '__edit_mode_set_keys',
      edits: { playSpeed: v }
    }, '*');
  });

  setTimeout(() => {
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
  }, 100);
</script>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<!-- 데이터 -->
<script src="data/korea-history-v3.js"></script>

<!-- globe.gl (three.js 번들 내장) -->
<script src="https://unpkg.com/globe.gl@2.33.0/dist/globe.gl.min.js"></script>

<!-- Leaflet (2D 평면 지도) -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<!-- 컴포넌트 -->
<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="components/GlobeMap.jsx"></script>
<script type="text/babel" src="components/Timeline.jsx"></script>
<script type="text/babel" src="components/EventModal.jsx"></script>
<script type="text/babel" src="components/MainPrototype.jsx"></script>

<!-- 앱 -->
<script type="text/babel">
  const App = () => {
    const dataset = window.HISTORY_DATA.korea;
    return (
      <DesignCanvas>
        <DCSection id="main" title="U-Origins — 열린 역사 아카이브"
          subtitle="지구본 지도 × 시간 스크럽바 × 사건 인과관계. 확장 가능한 플랫폼 구조.">
          <DCArtboard id="main-a" label="A · 메인 레이아웃 (지구본 + 하단 타임라인)" width={1280} height={800}>
            <MainPrototype dataset={dataset} />
          </DCArtboard>
          <DCArtboard id="main-b" label="B · 좌측 연표 사이드바" width={1280} height={800}>
            <VariantSidebar dataset={dataset} />
          </DCArtboard>
          <DCArtboard id="main-c" label="C · 풀스크린 지도 + 플로팅 타임라인" width={1280} height={800}>
            <VariantFullscreen dataset={dataset} />
          </DCArtboard>
        </DCSection>

        <DCSection id="notes" title="설계 노트"
          subtitle="확장 가능성과 플랫폼화를 위한 구조적 결정들.">
          <DCArtboard id="notes-a" label="데이터 스키마" width={560} height={520}>
            <div style={{ padding: 32, fontFamily: "'Pretendard', system-ui, sans-serif", color: '#2a251f', lineHeight: 1.6, fontSize: 13 }}>
              <div style={{ fontSize: 11, letterSpacing: 0.8, textTransform: 'uppercase', color: '#8a8578', fontWeight: 600, marginBottom: 10 }}>
                확장 가능한 데이터 구조
              </div>
              <h3 style={{ margin: '0 0 16px', fontSize: 20, fontWeight: 700, letterSpacing: -0.3 }}>카테고리별 독립 데이터셋</h3>
              <pre style={{ background: '#fafaf7', padding: 14, borderRadius: 6, fontSize: 11, lineHeight: 1.55, overflow: 'auto', margin: 0, border: '1px solid #eae5d8' }}>{`HISTORY_DATA = {
  korea:       { ... },   // 현재
  china:       { ... },   // 추가 예정
  world:       { ... },   // 카테고리
  religion:    { ... },   // 종교 전파
}

// 각 카테고리는 동일한 스키마:
{
  id, label, range, focus,
  eras:        [...],
  events:      [...],      // causes[], effects[]
  territories: [...],      // 연도별 영역
  layers:      { ... }     // 종교, 수도 이동 등
}`}</pre>
              <p style={{ marginTop: 16, color: '#6b6a63' }}>
                새 시대·사건·영토를 파일에 JSON으로 추가하는 것만으로 데이터 확장.
                관리자/기여자용 어드민 UI는 같은 스키마로 쓰기 지원.
              </p>
            </div>
          </DCArtboard>

          <DCArtboard id="notes-b" label="참여·검증 플로우" width={560} height={520}>
            <div style={{ padding: 32, fontFamily: "'Pretendard', system-ui, sans-serif", color: '#2a251f', lineHeight: 1.6, fontSize: 13 }}>
              <div style={{ fontSize: 11, letterSpacing: 0.8, textTransform: 'uppercase', color: '#8a8578', fontWeight: 600, marginBottom: 10 }}>
                역사 = 다중 시각
              </div>
              <h3 style={{ margin: '0 0 16px', fontSize: 20, fontWeight: 700, letterSpacing: -0.3 }}>좋아요/싫어요 + 이슈 제기</h3>
              <div style={{ display: 'flex', flexDirection: 'column', gap: 12 }}>
                <div style={{ padding: 12, background: '#fafaf7', borderRadius: 6, border: '1px solid #eae5d8' }}>
                  <div style={{ fontWeight: 600, marginBottom: 4 }}>👍 / 👎 반응</div>
                  <div style={{ color: '#6b6a63', fontSize: 12 }}>서술의 유용성을 집계. 공개 지표.</div>
                </div>
                <div style={{ padding: 12, background: '#fafaf7', borderRadius: 6, border: '1px solid #eae5d8' }}>
                  <div style={{ fontWeight: 600, marginBottom: 4 }}>🚩 이슈 제기</div>
                  <div style={{ color: '#6b6a63', fontSize: 12 }}>오류·편향·다른 시각을 텍스트로 제출.
                  <strong style={{ color: '#c25b3f' }}> 관리자에게만 전달</strong>되어 공론화 방지.</div>
                </div>
                <div style={{ padding: 12, background: '#fcf5f2', borderRadius: 6, border: '1px solid #e5c7bd' }}>
                  <div style={{ fontWeight: 600, marginBottom: 4, color: '#8b3a24' }}>관리자 검토 → 수정/반영</div>
                  <div style={{ color: '#6b6a63', fontSize: 12 }}>누적된 이슈는 동일 사건에 대한 다중 시각 카드로 발전 가능.</div>
                </div>
              </div>
            </div>
          </DCArtboard>

          <DCArtboard id="notes-c" label="로드맵" width={560} height={520}>
            <div style={{ padding: 32, fontFamily: "'Pretendard', system-ui, sans-serif", color: '#2a251f', lineHeight: 1.6, fontSize: 13 }}>
              <div style={{ fontSize: 11, letterSpacing: 0.8, textTransform: 'uppercase', color: '#8a8578', fontWeight: 600, marginBottom: 10 }}>
                점진적 확장
              </div>
              <h3 style={{ margin: '0 0 16px', fontSize: 20, fontWeight: 700, letterSpacing: -0.3 }}>차곡차곡 쌓이는 플랫폼</h3>
              <ol style={{ margin: 0, paddingLeft: 20, color: '#3a352d' }}>
                <li style={{ marginBottom: 10 }}><strong>Phase 1 (현재).</strong> 한국사 · 국가/제국 영토 레이어 · 인과관계 · 참여</li>
                <li style={{ marginBottom: 10 }}><strong>Phase 2.</strong> 동아시아 확장 — 중국/일본과 한국사 상호 참조</li>
                <li style={{ marginBottom: 10 }}><strong>Phase 3.</strong> 종교·수도 이동·교역로 레이어 추가</li>
                <li style={{ marginBottom: 10 }}><strong>Phase 4.</strong> 세계사 전체 + 카테고리(전쟁사, 종교사, 과학사) 필터</li>
                <li style={{ marginBottom: 10 }}><strong>Phase 5.</strong> 사용자 기여 (위키식), 학교/박물관 API</li>
              </ol>
            </div>
          </DCArtboard>
        </DCSection>
      </DesignCanvas>
    );
  };

  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
